[variables]
NODE_VERSION = "20"

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@9.15.9 --activate", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm exec prisma generate", "pnpm run build"]

[start]
cmd = "sh -c 'mkdir -p \"${UPLOAD_DIR:-/data/uploads}\" && ./node_modules/.bin/prisma db push && ./node_modules/.bin/next start -p ${PORT:-3000}'"
